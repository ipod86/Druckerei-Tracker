<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Druckerei Tracker</title>
  <link rel="stylesheet" href="/css/app.css">
  <link id="dynamic-favicon" rel="icon" href="/uploads/branding/favicon.ico" type="image/x-icon">
</head>
<body>
  <!-- Login Page -->
  <div id="login-page" class="login-page hidden">
    <div class="login-box">
      <div class="login-logo">
        <img id="login-logo" src="/uploads/branding/logo.png" alt="Logo" onerror="this.style.display='none'">
        <h1 id="login-app-name">Druckerei Tracker</h1>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label for="username">Benutzername</label>
          <input type="text" id="username" name="username" required autocomplete="username" placeholder="Benutzername">
        </div>
        <div class="form-group">
          <label for="password">Passwort</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Passwort">
        </div>
        <div id="login-error" class="error-msg hidden"></div>
        <button type="submit" class="btn btn-primary btn-full">Anmelden</button>
      </form>
    </div>
  </div>

  <!-- Main App -->
  <div id="app-shell" class="hidden">
    <!-- Navigation -->
    <nav class="navbar">
      <div class="navbar-left">
        <button class="hamburger" id="sidebar-toggle" title="Menü">
          <span></span><span></span><span></span>
        </button>
        <div class="navbar-brand">
          <img id="nav-logo" src="/uploads/branding/logo.png" alt="Logo" onerror="this.style.display='none'">
          <span id="nav-app-name">Druckerei Tracker</span>
        </div>
      </div>
      <div class="navbar-center">
        <div class="search-container">
          <input type="text" id="search-input" placeholder="Suchen..." autocomplete="off">
          <div id="search-results" class="search-dropdown hidden"></div>
        </div>
      </div>
      <div class="navbar-right">
        <div class="notification-bell" id="notification-bell">
          <button class="btn-icon" id="notif-btn" title="Benachrichtigungen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            <span id="notif-badge" class="badge hidden">0</span>
          </button>
          <div id="notif-dropdown" class="notif-dropdown hidden">
            <div class="notif-header">
              <span>Benachrichtigungen</span>
              <button id="notif-read-all" class="btn-link">Alle gelesen</button>
            </div>
            <div id="notif-list"></div>
          </div>
        </div>
        <div class="user-menu" id="user-menu">
          <button class="btn-icon user-menu-btn" id="user-menu-btn">
            <span id="nav-username">User</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>
          <div id="user-dropdown" class="user-dropdown hidden">
            <div id="user-info-nav" class="user-dropdown-item user-info"></div>
            <hr>
            <button class="user-dropdown-item" id="change-password-btn">Passwort ändern</button>
            <button class="user-dropdown-item" id="logout-btn">Abmelden</button>
          </div>
        </div>
      </div>
    </nav>

    <!-- Sidebar -->
    <div class="layout">
      <aside class="sidebar" id="sidebar">
        <nav class="sidebar-nav">
          <a href="#dashboard" class="sidebar-item" data-page="dashboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            Dashboard
          </a>
          <a href="#board" class="sidebar-item" data-page="board">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="5" height="18"/><rect x="10" y="3" width="5" height="18"/><rect x="17" y="3" width="5" height="11"/></svg>
            Board
          </a>
          <a href="#archive" class="sidebar-item" data-page="archive">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
            Archiv
          </a>
          <a href="#customers" class="sidebar-item" data-page="customers">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Kunden
          </a>
          <a href="#admin" class="sidebar-item admin-only" data-page="admin">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M5.34 18.66l-1.41 1.41M19.07 19.07l-1.41-1.41M5.34 5.34L3.93 3.93M22 12h-2M4 12H2M12 22v-2M12 4V2"/></svg>
            Administration
          </a>
        </nav>
      </aside>

      <!-- Main Content -->
      <main class="main-content" id="main-content">
        <div id="page-dashboard" class="page hidden"></div>
        <div id="page-board" class="page hidden"></div>
        <div id="page-archive" class="page hidden"></div>
        <div id="page-customers" class="page hidden"></div>
        <div id="page-admin" class="page hidden"></div>
      </main>
    </div>
  </div>

  <!-- Card Detail Modal -->
  <div id="card-modal" class="modal hidden">
    <div class="modal-backdrop" id="card-modal-backdrop"></div>
    <div class="modal-content card-modal-content">
      <div id="card-modal-body"></div>
    </div>
  </div>

  <!-- Move Card Modal -->
  <div id="move-modal" class="modal hidden">
    <div class="modal-backdrop" id="move-modal-backdrop"></div>
    <div class="modal-content move-modal-content">
      <div class="modal-header">
        <h2>Karte verschieben</h2>
        <button class="modal-close" id="move-modal-close">&times;</button>
      </div>
      <div id="move-modal-body"></div>
    </div>
  </div>

  <!-- Create Card Modal -->
  <div id="create-card-modal" class="modal hidden">
    <div class="modal-backdrop" id="create-card-modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>Neue Karte erstellen</h2>
        <button class="modal-close" id="create-card-modal-close">&times;</button>
      </div>
      <div id="create-card-modal-body"></div>
    </div>
  </div>

  <!-- Confirm Dialog -->
  <div id="confirm-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content confirm-modal-content">
      <div class="modal-header">
        <h2 id="confirm-title">Bestätigen</h2>
      </div>
      <p id="confirm-message"></p>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="confirm-cancel">Abbrechen</button>
        <button class="btn btn-danger" id="confirm-ok">Bestätigen</button>
      </div>
    </div>
  </div>

  <!-- Change Password Modal -->
  <div id="password-modal" class="modal hidden">
    <div class="modal-backdrop" id="password-modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>Passwort ändern</h2>
        <button class="modal-close" id="password-modal-close">&times;</button>
      </div>
      <div class="modal-body" id="password-modal-body">
        <form id="password-form">
          <div class="form-group">
            <label>Aktuelles Passwort</label>
            <input type="password" id="current-password" name="current_password" required>
          </div>
          <div class="form-group">
            <label>Neues Passwort</label>
            <input type="password" id="new-password" name="password" required>
          </div>
          <div class="form-group">
            <label>Passwort bestätigen</label>
            <input type="password" id="confirm-password" required>
          </div>
          <div id="password-error" class="error-msg hidden"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" id="password-modal-cancel">Abbrechen</button>
            <button type="submit" class="btn btn-primary">Passwort ändern</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div id="toast-container"></div>

  <script src="/js/Sortable.min.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/board.js"></script>
  <script src="/js/card.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/admin.js"></script>
  <script src="/js/archive.js"></script>
</body>
</html>
